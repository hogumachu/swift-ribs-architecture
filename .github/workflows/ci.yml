name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-tests:
    name: Package tests
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show toolchain version
        run: |
          xcodebuild -version
          swift --version

          SWIFT_VERSION="$(swift --version | awk '/Swift version/ { print $3 }')"
          SWIFT_MAJOR="${SWIFT_VERSION%%.*}"
          SWIFT_MINOR="${SWIFT_VERSION#*.}"
          SWIFT_MINOR="${SWIFT_MINOR%%.*}"

          if [ "$SWIFT_MAJOR" -lt 6 ] || { [ "$SWIFT_MAJOR" -eq 6 ] && [ "$SWIFT_MINOR" -lt 2 ]; }; then
            echo "Swift $SWIFT_VERSION detected, but Package.swift requires swift-tools-version 6.2."
            echo "Please use a runner/Xcode that includes Swift 6.2 or newer."
            exit 1
          fi

      - name: Run package tests
        run: |
          WORKSPACE="RIBsArchitecture.xcworkspace"
          SCHEME="RIBsArchitectureTests"
          DESTINATION_ID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ && !/unavailable/ { print $2; exit }')"

          if [ -z "$DESTINATION_ID" ]; then
            echo "No available iPhone simulator found."
            xcrun simctl list devices available
            exit 1
          fi

          echo "Using simulator id: $DESTINATION_ID"
          xcodebuild test \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -destination "id=$DESTINATION_ID"
